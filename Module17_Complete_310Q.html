<script>
/* ======================================================================
   EDIT ZONE — CHANGE THESE 3 THINGS FOR EVERY NEW CBT (SUBJECT/MODULE)
   1) CONFIG below       -> page title + header text for the new subject
   2) TOPIC_COLOR_ORDER   -> optional: order topics should get colors in
                             (leave as [] to auto-color in first-seen order)
   3) questions array     -> paste your new question set, replacing all
                             the objects between the [ and ] below.
                             Any number of questions works — 10 or 1000.
   Do NOT touch anything below the "DO NOT EDIT BELOW" marker.
====================================================================== */

const CONFIG = {
  pageTitle: "EASA/DGCA Part-66 | Module 17 – Propellers Complete CBT",
  headerLeft: "EASA B1",
  headerRight: "Module 17 – Propellers (Complete)",
  resultsTitle: "✈ QUIZ COMPLETE",
  resultsSubtitle: "EASA/DGCA Module 17 — Propellers (17.1 through 17.7)"
};

const TOPIC_COLOR_ORDER = []; // e.g. ["Topic A","Topic B"] or leave empty

const questions = [
  {topic:"Module 17 - Propellers",q:"High speed propellers are designed to",opts:["rotate at high RPM", "operate at high forward speeds", "operate at supersonic tip speeds"],ans:1,exp:""},
  {topic:"Module 17 - Propellers",q:"When in the windmill position ATM",opts:["opposes CTM", "is not related to CTM", "assists CTM"],ans:2,exp:"ATM normally increases blade angle but in the windmill condition reverses and assists CTM"},
  {topic:"Module 17 - Propellers",q:"The optimum angle for a fixed pitch propeller is",opts:["15 degrees", "2 - 4 degrees", "6 - 10 degrees"],ans:1,exp:"Jepperson A&P Powerplant Page 12-4 Refers"},
  {topic:"Module 17 - Propellers",q:"A left handed propeller is one that",opts:["rotates clockwise when viewed from the rear", "rotates clockwise when viewed from the front", "is fitted to an engine on the left side of the aircraft"],ans:1,exp:"Left hand propeller rotates anticlockwise when viewed from the rear"},
  {topic:"Module 17 - Propellers",q:"Forces acting on a propeller are",opts:["centrifugal, twisting, and bending", "torque, thrust and centrifugal", "torsion, tension and thrust"],ans:0,exp:"Jepperson Powerplant Page 12-5 to 12- 7 refers"},
  {topic:"Module 17 - Propellers",q:"The blade angle at the root is",opts:["less than the tip", "same from tip to root", "greater than the tip"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Page 13 Refers"},
  {topic:"Module 17 - Propellers",q:"What force on a propeller blade turns the blades to a fine pitch?",opts:["ATM", "Torque", "CTM"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Page 15 refers"},
  {topic:"Module 17 - Propellers",q:"The purpose of propeller twist is",opts:["coarsen the blade angle at the root", "to maintain Blade Angle along the blade", "to maintain Angle of Attack at the same value along the blade"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Page 13 Refers"},
  {topic:"Module 17 - Propellers",q:"The forces acting on a propeller blade are",opts:["bending, twisting and centrifugal", "thrust, aerodynamic and tension", "thrust and torque"],ans:0,exp:"Refer Jepperson Powerplant Page 12- 5 to 7"},
  {topic:"Module 17 - Propellers",q:"Blade angle at the root is",opts:["low", "high", "master blade angle"],ans:1,exp:"Jepperson Aircraft Propellers and Control Pages 55-58 Refer"},
  {topic:"Module 17 - Propellers",q:"Blade angle is taken from the chord and",opts:["propeller shaft", "relative airflow", "plane of rotation"],ans:2,exp:"Jepperson Aircraft Propellers and Control Page132 refer"},
  {topic:"Module 17 - Propellers",q:"What forces act on a propeller blade?",opts:["Thrust and torque", "Bending, thrust, torque", "Bending, CTM and ATM"],ans:2,exp:"Refer Jepperson Aircraft Propellers and Controls Page 14-15 Note Thrust and Torque are both"},
  {topic:"Module 17 - Propellers",q:"CTM will",opts:["try to bend the blade away from the engine", "turn the blade about the lateral axis", "cause the tips to rotate at supersonic speeds"],ans:1,exp:"Jepperson Aircraft Propellers and Controls page Page 15 refers"},
  {topic:"Module 17 - Propellers",q:"From reverse pitch, to return to normal pitch it",opts:["passes through coarse then fine", "passes through coarse", "passes through fine"],ans:2,exp:""},
  {topic:"Module 17 - Propellers",q:"When in reverse pitch, CTM will tend to move the propeller blades towards",opts:["a positive pitch", "a position depending on rpm", "a negative pitch"],ans:0,exp:"CTM always rotates towards the plane of rotation"},
  {topic:"Module 17 - Propellers",q:"If the blade angle is increased",opts:["the pitch becomes finer", "the pitch becomes coarser", "lateral stability decreases"],ans:1,exp:"Pitch is an alternative name for blade angle"},
  {topic:"Module 17 - Propellers",q:"As a propeller blade moves through the air, forces are produced, which are known as",opts:["lift and torque", "lift and drag", "thrust and torque"],ans:2,exp:"Jepperson A & P Powerplant Page 12- 6"},
  {topic:"Module 17 - Propellers",q:"A rotating propeller imparts rearwards motion to a",opts:["small mass of air at high velocity", "large mass of air at low velocity", "small mass of air at low velocity"],ans:1,exp:"Kermode Mechanics of Flight Fig 4.4 refers"},
  {topic:"Module 17 - Propellers",q:"Propeller efficiency is",opts:["the ratio of output speed to input propeller speed", "the ratio of the work applied to the geometric pitch to useful work on the C.S.U", "the ratio of the useful work done by the propeller to work done by the engine on the propeller"],ans:2,exp:"Kermode Mechanics of Flight Page 134 Refers"},

  {topic:"Module 17 - Propellers",q:"The hydromatic variable pitch propeller is operated on the principle of",opts:["a venturi or 'u' tube with mercury", "an electrical motor moving a gear segment", "oil pressure moving a piston"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Page 85 refer"},
  {topic:"Module 17 - Propellers",q:"The constant speed unit (C.S.U.) governor works on the principle of",opts:["manual selection through a gearbox", "centrifugal twisting moments", "spring pressure acting against centrifugal force"],ans:2,exp:"Jepperson A&P Powerplant Page 12- 7/8 refers"},
  {topic:"Module 17 - Propellers",q:"The purpose of the pitch change cams is to",opts:["convert rotary motion to linear motion", "prevent windmilling", "convert linear motion to rotary motion"],ans:2,exp:"Jepperson Aircraft Gas Turbine Powerplants Fig 12-14 refers"},
  {topic:"Module 17 - Propellers",q:"The gear type pump in a C.S.U. or P.C.U",opts:["lubricates the entire propeller system", "boosts engine oil system pressure", "assist the governor valve to move"],ans:1,exp:"Jepperson Aircraft Propellers and Controls Fig 11-33 refers"},
  {topic:"Module 17 - Propellers",q:"When an engine fails",opts:["the propeller is feathered using an electrical feathering pump", "the propeller is feathered using the propeller governor pump", "the propeller is feathered using counterweights"],ans:0,exp:"Jepperson A&P Powerplant Page 12- 30 refers"},
  {topic:"Module 17 - Propellers",q:"The purpose of an accumulator in a single acting propeller system is to",opts:["to port oil to the coarse pitch oil line to assist in feathering the propelle", "accelerate the unfeathering process", "provide back up to the governor pump"],ans:1,exp:"Jepperson A&P Powerplant Page 12- 26 refers"},
  {topic:"Module 17 - Propellers",q:"When auto feathering has taken place the feathering pump is switched off by",opts:["pressure control drop switch", "carrying out the manual feather drill", "removing the pump circuit breaker or fuse"],ans:1,exp:"The pump is switched off by pressing the alternate action pump switch-part of the manual feather drill"},
  {topic:"Module 17 - Propellers",q:"On a free turbine engine it is possible to vary the propeller RPM whilst the engine RPM remains constant",opts:["by operating the Power lever", "it is not possible to vary the propeller RPM", "by operating the PCU control Lever"],ans:2,exp:"The PCU lever changes the pressure on the governor spring thus changing the pitch of the blades"},
  {topic:"Module 17 - Propellers",q:"A propeller control Unit hydraulic system is supplied with oil from the",opts:["engine lubrication oil tank", "aircraft hydraulic System", "PCU oil tank"],ans:0,exp:"Jepperson Aircraft Propellers and Controls Page 59 refers"},
  {topic:"Module 17 - Propellers",q:"Low torque sensing is used to initiate",opts:["relighting", "fine pitch selection", "auto feathering"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Page 135 refers"},
  {topic:"Module 17 - Propellers",q:"What is the purpose of the auto coarsening system?",opts:["To prevent overspeeding in the event of the flight fine pitch stop failing", "To reduce drag during power loss", "To save the pilot making minor changes when changing altitude"],ans:0,exp:"CAIP's Leaflet PL/1-1 refer - note this is not an auto feather system"},
  {topic:"Module 17 - Propellers",q:"In a single acting propeller, blade angle is increased by",opts:["counterweights and a feathering spring", "CTM", "oil pressure"],ans:0,exp:"CAIP's PL leaflets refer. Oil pressure turns the prop to fine. If the oil pressure is released by the CSU the spring and counterweights drive the prop to feather"},
  {topic:"Module 17 - Propellers",q:"The function of a propeller pitch lock is to prevent the propeller from",opts:["coarsening", "reducing below flight fine pitch", "fining off in the event of pitch lock mechanism failure"],ans:2,exp:"CAIP's PL leaflets refer to a pitch lock that holds the fine pitch stop in position, but also adds that some manufacturers have a pitch lock device that locks the prop in its last position in the event of failure of the pitch lock mechanism. For a description of this system see Jeppesen Aircraft Propellers and Controls page 136"},
  {topic:"Module 17 - Propellers",q:"The minimum propeller pitch is established by the",opts:["superfine pitch stop", "pitch Lock", "flight fine pitch stop"],ans:0,exp:"CAIP's PL leaflets refer. Oil pressure turns the prop to fine. If the oil pressure is released by the CSU the spring and counterweights drive the prop to feather"},
  {topic:"Module 17 - Propellers",q:"Oil for the feathering system is taken from",opts:["a separate feathering oil tank", "a feathering reserve in the engine oil tank", "the engine lubrication system"],ans:1,exp:"Jepperson Aircraft Propellers and Controls Page 10 refers"},
  {topic:"Module 17 - Propellers",q:"What are the centrifugal latches in a single acting propeller used for?",opts:["Prevent CTM", "Prevent feathering of the prop on shutdown", "Prevent Propeller moving to superfine"],ans:1,exp:"Jepperson Aircraft Propellers and Controls Fig 11-4 refers"},
  {topic:"Module 17 - Propellers",q:"In a two position propeller",opts:["ATM turns the prop to fine", "oil pushes the prop to fine", "oil pushes the prop to coarse"],ans:1,exp:"Jepperson aircraft propellers and controls Page 96 Refers"},
  {topic:"Module 17 - Propellers",q:"An overspeed condition causes governor spring pressure to be",opts:["the same as centrifugal force", "more than centrifugal force", "less than centrifugal force"],ans:2,exp:"The bob weights lift the governor valve in this condition, thus they have more force than the spring"},
  {topic:"Module 17 - Propellers",q:"When the engine is running, the CSU is sensing",opts:["propeller tip speed", "propeller blade angle", "engine RPM"],ans:2,exp:"Engine RPM is sensed via the governor bob weights"},
  {topic:"Module 17 - Propellers",q:"An accumulator may be fitted to",opts:["feather the propeller", "unfeather the propeller", "provide emergency control"],ans:1,exp:"The accumulator is needed to drive the prop out of feather and hence get it rotating. Normally seen on a single acting propeller system"},
  {topic:"Module 17 - Propellers",q:"If governor weight spring pressure is reduced",opts:["governor weights will pivot inwards raising the governor valve allowing the blades to move to a coarser pitch", "governor weights will spring outwards raising the governor valve allowing the blades to move to a finer pitch", "governor weights will spring outwards raising the governor valve allowing the blades to move to a coarser pitch"],ans:2,exp:"When 'on speed' spring pressure equals the governor centrifugal force"},
  {topic:"Module 17 - Propellers",q:"A constant speed variable pitch propeller is running whilst stationary on the ground. If it is facing into a headwind it will",opts:["speed up", "remain constant", "slow down"],ans:1,exp:"A headwind acts the same as increased forward speed. The prop will coarsen off and the speed will remain the same"},
  {topic:"Module 17 - Propellers",q:"If the TAS of an aircraft increases, the CSU will",opts:["increase the blade angle to provide constant RPM", "decrease the blade angle to provide constant RPM", "change the blade angle to provide constant RPM"],ans:0,exp:"This causes blade to coarsen off to stop overspeeding and as a result the speed remains the same"},
  {topic:"Module 17 - Propellers",q:"When governor spring load is less than governor weights, the CSU is in",opts:["overspeed", "underspeed", "underspeed"],ans:0,exp:"Jeppersen Aircraft Propellers and Controls Page 57 refers"},
  {topic:"Module 17 - Propellers",q:"An aircraft's propeller system beta range",opts:["is used to achieve maximum thrust during take- off", "refers to the most fuel efficient pitch range to use at a given engine RPM", "is used to produce zero or negative thrust"],ans:2,exp:"Beta range is used on the ground"},
  {topic:"Module 17 - Propellers",q:"How is a propeller controlled in a large aircraft?",opts:["By engine power lever", "By varying teh engine RPM except for feathering and reversing", "Independently of the engine"],ans:0,exp:"AC65-12A"},
  {topic:"Module 17 - Propellers",q:"Manually feathering a hydromechanical propeller means to",opts:["block governor oil pressure to the cylinder of the propeller", "port governor oil pressure to the cylinder of the propeller", "block governor oil pressure from the cylinder of the propeller"],ans:2,exp:"AC65-12A"},
  {topic:"Module 17 - Propellers",q:"How is the oil pressure delivery on a hydromatic propeller normally stopped after the blades have reached their full-feathered position?",opts:["Stop lugs in the teeth of the rotating cam", "Electric cut-out pressure switch", "Pulling out the feathering push-button"],ans:1,exp:"AC65-12A"},
  {topic:"Module 17 - Propellers",q:"Counterweights on constant-speed propellers are generally used to",opts:["increase blade angle", "decrease blade angle", "unfeather the propeller"],ans:0,exp:"AC65-12A"},
  {topic:"Module 17 - Propellers",q:"Constant speed non-feathering McCauley, Hartzell and other propellers of similar design without counterweights increase pitch angle using",opts:["centrifugal twisting moment", "spring pressure", "oil pressure"],ans:2,exp:"AC65-12A"},
  {topic:"Module 17 - Propellers",q:"What are the rotational speed and blade pitch angle requirements of a constant-speed propeller during take-off?",opts:["High speed and low pitch angle", "High speed and high pitch angle", "Low speed and high pitch angle"],ans:0,exp:"AC65-12A"},
  {topic:"Module 17 - Propellers",q:"A constant speed propeller provides maximum efficiency by",opts:["increasing the lift coefficient of the blades", "adjusting blade angle for most conditions encountered during flight", "increasing blade pitch as the aircraft speed increases"],ans:1,exp:"AC65-12A"},
  {topic:"Module 17 - Propellers",q:"Synchrophasing reduces vibration by the use of",opts:["pulse probes and a single synchrophase unit", "tachometers and correction motors", "coordinating the rpm of each engine"],ans:0,exp:"Refer Jepperson Aircraft Propellers and Controls Page 134"},
  {topic:"Module 17 - Propellers",q:"Synchronising can only be achieved if the slave propeller is",opts:["the same speed as the master", "within 20 rpm of the master", "within 100 rpm of the master"],ans:2,exp:"Jepperson Aircraft Propellers and Control page 132 refers"},
  {topic:"Module 17 - Propellers",q:"Synchronising is carried out to",opts:["match propeller tip speed", "match engine rpm", "match blade phase angle difference"],ans:0,exp:"Jepperson Aircraft Propellers and Control page 132 refers"},
  {topic:"Module 17 - Propellers",q:"The synchronisation governor monitors",opts:["RPM", "propeller tip speeds", "thrust tip speeds"],ans:0,exp:"Jepperson Aircraft Propellers and Controls Page 37 refers"},
  {topic:"Module 17 - Propellers",q:"Synchronisation is used to",opts:["reduce vibration and noise", "reduce the pitch of the fastest running blade", "preset the phase angle of propellers"],ans:0,exp:"Refer Jepperson Aircraft Propellers and Controls Page131"},
  {topic:"Module 17 - Propellers",q:"Synchronisation is used",opts:["on the ground", "in flight except landing and take off", "in flight"],ans:1,exp:"Jepperson Aircraft Propellers and Control Page136 refer to Auto Feather systems"},
  {topic:"Module 17 - Propellers",q:"The propeller synchronising system is put into operation by",opts:["adjusting the engine rpm at required cruise speed then switching on the synchroniser", "adjusting the engine rpm then propeller rpm to required speed then switching on", "switching on the synchronizer then adjust the engine rpm so that all engines adjust together"],ans:0,exp:"Jepperson aircraft propellers and controls Page 132 Refers"},
  {topic:"Module 17 - Propellers",q:"Propellers are synchronised by the",opts:["power lever", "PCU governor", "prop lever"],ans:1,exp:"EHJ Pallett Aircraft Electrical Systems Page 182 refers"},
  {topic:"Module 17 - Propellers",q:"Unlike the automatic synchronizing system, the synchrophasing system of a two-propeller aircraft",opts:["sets the blade phase angle of two constant speed propellers", "causes the same rotation speed of the two propellers", "matches the blade angle of variable pitch propellers"],ans:0,exp:"Synchrophasing is the setting of blade phase angle difference to minimise vibration"},
  {topic:"Module 17 - Propellers",q:"In a propeller synchrophasing system, an electric actuator",opts:["rotates (controls) the slave engine governor", "equalizes the governor signals", "turns the flexible shaft leading to the trimmer assembly"],ans:0,exp:"Jeppesen Propellers and controls Fig 13-20 shows the actuator attached to the governor"},
  {topic:"Module 17 - Propellers",q:"If one signal is lost into the comparator unit when Synchrophasing is operating",opts:["Synchrophasing is lost and the engines continue to function normally", "the slower engine immediately goes to feather", "both engines remain running until there is a difference, of commonly, (4 to 5 percent), at which the slower of the engines is then feathered"],ans:0,exp:"Synchrophasing is used in conjunction with synchronising to reduce aircraft vibration"},
  {topic:"Module 17 - Propellers",q:"Synchronisation controls RPM within what range?",opts:["100 RPM", "150 RPM", "50 RPM"],ans:0,exp:"Jeppersen Aircraft Propellers and Controls Page 132 refers"},
  {topic:"Module 17 - Propellers",q:"When should synchronisation be used?",opts:["During cruise", "During landing", "Anytime"],ans:0,exp:"Jeppersen Aircraft Propellers and Controls Page 132 refers"},
  {topic:"Module 17 - Propellers",q:"Propeller Synchronizing works utilizing",opts:["RPM Levers", "propeller lever", "governor"],ans:2,exp:"The governor is sometimes known as a comparator unit"},
  {topic:"Module 17 - Propellers",q:"In relation to a propeller aircraft, synchrophasing would be used on",opts:["all Aircraft", "all Multi engine aircraft", "turbo prop Aircraft"],ans:1,exp:"Synchrophasing can be used on any multi propeller driven aircraft"},
  {topic:"Module 17 - Propellers",q:"A propeller synchrophasing system allows a pilot to reduce noise and vibration by",opts:["setting the RPM of all propellers exactly the same", "adjusting the plane of rotation of all propellers", "adjusting the phase angle between the propellers"],ans:2,exp:""},
  {topic:"Module 17 - Propellers",q:"A propeller synchronising system allows a pilot to reduce noise and vibration by",opts:["adjusting the phase angle between the propellers", "setting the RPM of all propellers exactly the same", "adjusting the plane of rotation of all propellers"],ans:1,exp:"65-12A"},
  {topic:"Module 17 - Propellers",q:"What is the function of automatic propeller synchronizing system on multiengined aircraft?",opts:["To control tip speed of all propellers", "To control the power output of all engines", "To control engine RPM and reduce vibration"],ans:2,exp:"65-12A"},
  {topic:"Module 17 - Propellers",q:"On most reciprocating multiengined aircraft, automatic propeller synchronization is accomplished through the actuation of the",opts:["propeller governors", "propeller control levers", "throttle levers"],ans:0,exp:"AC65-12A"},
  {topic:"Module 17 - Propellers",q:"Electrically de-iced propeller slip rings have regular resistance checks for",opts:["oxidisation due to altitude", "open circuit heating elements", "wear between brushes and slip ring"],ans:1,exp:"A pair of slip rings conduct power to the heating elements CAIP's leaflet PL/1-4 refers"},
  {topic:"Module 17 - Propellers",q:"Propeller anti-icing may be achieved by",opts:["using iso-propyl alcohol de-icing fluid sprayed on the blade", "using commercial de-icing fluid sprayed on the pro", "a using hot air from the compressor"],ans:0,exp:"Jepperson Aircraft Propellers and Control page 124 refers"},
  {topic:"Module 17 - Propellers",q:"De-icing of the propeller can be monitored by",opts:["viewing the deicing fluid level sight glass", "viewing the blade and observing ice falling off the blade", "an ammeter in the flight deck"],ans:2,exp:"Jepperson Aircraft Propellers and Control page 129 refers"},
  {topic:"Module 17 - Propellers",q:"Insulation testing of electrical de-icing systems should be periodically carried out because of",opts:["an open circuit in one of the blades", "oxidation due to atmospheric conditions", "wear on the slip rings"],ans:0,exp:"CAIPs leaflet PL/1-4 refers"},
  {topic:"Module 17 - Propellers",q:"Insulation checks on propeller electrical heating elements should be carried out frequently due to",opts:["short/open circuits in the heating system wires along the propeller blade", "oxidation of slip ring and brush gear assembly", "deposits formed due to the wear of slip ring and brush gear assembly"],ans:0,exp:"CAIP's Leaflet PL/1-4 Para 3.3-2 Refers"},
  {topic:"Module 17 - Propellers",q:"Where is the de-icing boot?",opts:["Root", "Trailing edge", "Tip"],ans:0,exp:"Refer Jepperson Aircraft Propellers and Controls Pages 126-127"},
  {topic:"Module 17 - Propellers",q:"How is anti icing fluid fed to the individual blades?",opts:["Pump to a slinger ring", "Pump to each blade rubber feed boot", "Under gravity to the slinger ring then on to the blade"],ans:0,exp:"Jepperson Aircraft Propellers and Controls Page 124 refers"},
  {topic:"Module 17 - Propellers",q:"Ice is removed from blades by",opts:["a continuously heated electrical boot", "rubber boots inflated in sequence using compressor hot air", "inboard and outboard boot sections heated in sequence by action of the timer"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Page 126 refers"},
  {topic:"Module 17 - Propellers",q:"Propeller blades are de-iced by",opts:["electrical heating elements bound in rubber overshoes on the blade leading edges", "generating eddy currents in the blade", "electrical heating elements wound around rubber shoes"],ans:0,exp:"Jepperson Aircraft Propellers and Controls Page 126 refers"},
  {topic:"Module 17 - Propellers",q:"Electrical power supplies on large aircraft, for electrical deicing are",opts:["AC", "DC", "Both AC or DC"],ans:1,exp:"CAIPs PL leaflets Refer"},
  {topic:"Module 17 - Propellers",q:"Propeller slip rings",opts:["convey oil for PCU to pitch change mechanism", "minimise slip", "conduct electrical power for de-icing"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Page 126 refers"},
  {topic:"Module 17 - Propellers",q:"On an electrical deicing system fast cycle is used",opts:["at low air temperature", "at high air temperature", "on the ground"],ans:1,exp:"Rolls Royce page 151 refers. Slow cycle meaning the elements are on for longer"},
  {topic:"Module 17 - Propellers",q:"The output of an anti-icing pump is controlled by",opts:["a rheostat", "the hand pump", "a cyclic timer"],ans:0,exp:"Jepperson aircraft propellers and controls Page 124 Refers"},
  {topic:"Module 17 - Propellers",q:"De-icing fluid goes to a slinger ring from",opts:["an electrical pump", "a hand pump", "a tank in the prop hub, providing constant feed once released"],ans:0,exp:"The pump is controlled by a rheostat to quicken or slow the flow"},
  {topic:"Module 17 - Propellers",q:"To increase anti icing effectiveness",opts:["increase cycle times", "increase the AC or DC current", "use liquid as well as electrical anti icing systems"],ans:1,exp:"Anticing refers to fluid deicing in Jeppersen Propeller and Controls page 123 therefore it is the rheostat that is adjusted to vary current"},
  {topic:"Module 17 - Propellers",q:"Propeller de-icing for varying rates of icing can be varied by",opts:["increasing propeller RPM", "increasing cyclic timing", "increasing the AC or DC voltage"],ans:1,exp:"Usually a slow and fast cycle are provided"},
  {topic:"Module 17 - Propellers",q:"Propeller De-icing can be checked by",opts:["checking the torque meter for abnormal readings", "checking the the de-icing ammeter", "visually checking for ice on the blades"],ans:0,exp:"Disturbed airflow due to ice will reduce the eficiency of the propeller"},
  {topic:"Module 17 - Propellers",q:"Proper operation of electric deicing boots on individual propeller blades may be best determined by",opts:["feeling the sequence of boot heating and have an assistant observe the loadmeter indications", "feeling the boots to see if they are heating", "observing the ammeter or loadmeter for current flow"],ans:0,exp:"65-12A"},
  {topic:"Module 17 - Propellers",q:"What unit in the propeller anti-icing system controls the output of the pump?",opts:["Pressure relief valve", "Rheostat", "Cycling timer"],ans:1,exp:"65-12A"},
  {topic:"Module 17 - Propellers",q:"Ice formation on the propellers, when the aircraft is in flight, will",opts:["decrease available engine power", "increase aircraft stall speed and increase noise", "decrease thrust and cause excessive vibration"],ans:2,exp:"65-12A"},
  {topic:"Module 17 - Propellers",q:"Propeller fluid anti-icing systems generally use which of the following?",opts:["Ethyl alcohol", "Ethylene glycol", "Isopropyl alcohol"],ans:2,exp:"65-12A"},
  {topic:"Module 17 - Propellers",q:"Thrust and camber faces of a propeller should be blended out to",opts:["5 times the depth of damage", "10 times to the depth of damage", "30 times to the depth of damage"],ans:2,exp:"Answer found in unattributed notes"},
  {topic:"Module 17 - Propellers",q:"An aerodynamic correction factor that is preceded by the letter Q indicates",opts:["thrust balance", "dynamic balance", "torque balance"],ans:2,exp:""},
  {topic:"Module 17 - Propellers",q:"Leading edges should be blended out to",opts:["5 times the depth of damage", "10 times the depth of damage", "30 times the depth of damage"],ans:1,exp:"Answer found in unattributed notes"},
  {topic:"Module 17 - Propellers",q:"If the tip of an electrical overshoe is torn",opts:["it may be cut back", "it may be classified as acceptable damage", "it must not be cut back"],ans:2,exp:""},
  {topic:"Module 17 - Propellers",q:"The shank of the propeller is permitted to have",opts:["no repairs", "minor repairs", "no decals fitted"],ans:0,exp:"Refer Jepperson A&P Powerplant Page 12-55"},
  {topic:"Module 17 - Propellers",q:"When blending out a gouge on the face or camber side of a blade, the additional metal to be removed for stress relief is",opts:["0.02 inch", "0.002 inch", "0.2 inch"],ans:1,exp:""},
  {topic:"Module 17 - Propellers",q:"Wooden propellers are permitted",opts:["repairs that do not affect weight and balance", "no repairs", "repairs using sawdust and aeroglue"],ans:2,exp:"Jepperson A&P Powerplant page 12- 53 refers"},
  {topic:"Module 17 - Propellers",q:"The preservative used to protect metal blades is",opts:["lanolin", "brown storage wax", "petroleum jelly"],ans:0,exp:""},
  {topic:"Module 17 - Propellers",q:"Composite propellers may have minor repairs carried out by",opts:["any approved 3rd party maintenance organization", "the operator", "any approved composite repair facility"],ans:2,exp:"Must be composite specialist organization"},
  {topic:"Module 17 - Propellers",q:"Details of propeller overhaul may be found in",opts:["Airworthiness Notice 75", "the AMM", "Airworthiness Notice 55"],ans:0,exp:"Refer CAA Airworthiness Notice 75"},
  {topic:"Module 17 - Propellers",q:"The ground clearance of a single engine tail wheel aircraft propeller is measured with the aircraft",opts:["tail wheel on the ground", "tail wheel in the take off position", "in the rigging position"],ans:1,exp:"Refer JAR 25.925"},
  {topic:"Module 17 - Propellers",q:"The structural clearance of a multi engine aircraft propeller",opts:["is taken between the engines with the props aligned", "is taken between the prop and the fuselage", "is taken from the ground"],ans:1,exp:"Refer JAR 25.925. Sometimes known as tip clearance"},
  {topic:"Module 17 - Propellers",q:"What position should the blades be when installing the pitch change mechanism onto a hydromatic propeller?",opts:["Feather", "Zero pitch", "Full reverse"],ans:0,exp:""},
  {topic:"Module 17 - Propellers",q:"The ground (sea) clearance of a sea plane propeller is",opts:["1 inch", "9 inches", "18 inches"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Fig 2-5 refers"},
  {topic:"Module 17 - Propellers",q:"Cropping is permitted to a maximum of",opts:["1 inch on all blades", "½ inch on all blades", "½ inch on one blade only"],ans:0,exp:"If 1 blade is cropped all must be cropped equally"},
  {topic:"Module 17 - Propellers",q:"Dynamic balance is confirmed by use of",opts:["knife edges and mandrel", "a tracking check", "a vibration analyser"],ans:2,exp:"Refer Jepperson Powerplant Page 12- 60"},
  {topic:"Module 17 - Propellers",q:"A metal propeller may be statically balanced by",opts:["adding varnish to the lighter blade", "removing metal from the opposite blade", "adding or removing lead wool to the hollow blade roots"],ans:2,exp:"Refer Jepperson Powerplant Page 12- 12"},
  {topic:"Module 17 - Propellers",q:"Mechanical vibration relating to propellers in a piston powered aircraft",opts:["is due to the crankshaft at intermittent power settings", "is due to the lead lag of the propeller compared to the engine", "is due to the power stroke of the engine and may have a more detrimental effect than aerodynamic vibration"],ans:2,exp:"Jepperson Aircraft Propellers and Control page 16 refers"},
  {topic:"Module 17 - Propellers",q:"Aerodynamic Correction Factor (A C F)",opts:["corrects for static balance", "is indicated in the form of degrees and minutes of pitch", "corrects for dynamic balance"],ans:1,exp:"A C F adjusts individual blade pitch angle to compensate for aerodynamic differences of blades in manufacture"},
  {topic:"Module 17 - Propellers",q:"A propeller with an adjustable blade can be adjusted",opts:["on the ground with the engine stationary", "in flight", "on the ground with the engine running"],ans:0,exp:"Jepperson Aircraft Propellers and Controls Page 37 refers"},
  {topic:"Module 17 - Propellers",q:"When on the ground with the engine idling the prop control should be",opts:["fully aft with the mixture at idle", "fully aft with the mixture at rich", "fully forward with the mixture at idle"],ans:1,exp:"Jepperson Powerplant Page 2-16 refers- rich mixture cools the cylinders"},
  {topic:"Module 17 - Propellers",q:"Operation with the engine at maximum boost should be limited to",opts:["prop at fine to prevent overstressing the engine", "prop at course to prevent overstressing the engine", "prop at windmill to prevent overstressing the engine"],ans:1,exp:"Maximum Boost indicates maximum power is applied to the prop"},
  {topic:"Module 17 - Propellers",q:"Damage to a leading edge can be blended in comparison to a blade face",opts:["by maintaining a smooth depression", "by not exceeding 25% of the chord", "at a steeper angle"],ans:2,exp:"10:1 compared to 30:1"},
  {topic:"Module 17 - Propellers",q:"The longitudinal clearance between the nose wheel and the propeller on a tricycle geared propeller is",opts:["9 inches", "18 inches", "1/2 inch"],ans:2,exp:"Refer JAR-25.925"},
  {topic:"Module 17 - Propellers",q:"A tracking check compares",opts:["2 Adjacent blades", "2 Opposite blades", "any 2 blades"],ans:2,exp:"Refer Jepperson Aircraft Propellers and Controls Page 32"},
  {topic:"Module 17 - Propellers",q:"A line of indentations at one blade section can be",opts:["blended within limits", "left for up to 12 months", "declared unserviceable"],ans:2,exp:"Jepperson Aircraft Propellers and Control Page 126 Refer"},
  {topic:"Module 17 - Propellers",q:"Propeller vibration due to a problem with propeller installations would have a",opts:["the same frequency as turbine vibration", "lower frequency than turbine vibration", "higher frequency than turbine vibration"],ans:1,exp:"Propeller RPM is always less than Gas Turbine RPM therefore vibration frequency will always be less"},
  {topic:"Module 17 - Propellers",q:"Preloading propeller blades before installation prevents",opts:["blade distortion", "blade flutter", "aerodynamic imbalance on the blades"],ans:1,exp:"Preloading refers to shimming the blade gear boss when being mated with the bevel gear cams in the hub"},
  {topic:"Module 17 - Propellers",q:"When unfeathering a propeller, the blade should be put into what position to stop propeller overspeed?",opts:["Negative pitch", "Fine pitch", "Coarse pitch"],ans:2,exp:"A Prop moved to coarse pitch will rotate the engine without overspeeding"},
  {topic:"Module 17 - Propellers",q:"Blade angle is measured using a",opts:["clinometer", "propeller protractor", "bevel protractor"],ans:1,exp:"Refer Jepperson Aircraft Propellers and Controls Fig 1-7"},
  {topic:"Module 17 - Propellers",q:"In the Beta range, angle of attack increases. The fuel flow increases, and what else increases?",opts:["Fuel temperature", "EPR and fuel temperature", "RPM and EGT"],ans:2,exp:"If fuel flow increases then RPM and EGT of the Gas Generator must increase"},
  {topic:"Module 17 - Propellers",q:"With a propeller defect, the frequency of vibration will be",opts:["higher than a auxiliary gearbox defect", "lower than a turbine defect", "higher than a turbine defect"],ans:1,exp:"Propeller vibration is always lower then turbine vibration"},
  {topic:"Module 17 - Propellers",q:"Blending of propeller blade defects refers to the",opts:["repainting of blade tips after cropping", "matching of paint finishes for appearances", "conversion of rough or sharp edges into smooth depression"],ans:2,exp:"Jepperson Aircraft Propellers and Controls Page 21.Blending is the smoothing of a defect"},
  {topic:"Module 17 - Propellers",q:"Removal of material from the propeller blade tips, resulting in a reduction in propeller diameter is called",opts:["tipping", "cropping", "topping"],ans:1,exp:"If you crop one blade (normally 1 inch maximum) the opposite blade must also be cropped"},
  {topic:"Module 17 - Propellers",q:"Prior to using the universal propeller protractor",opts:["ensure the propeller blade is at the horizontal", "determine the reference blade station", "check date stamp for serviceability"],ans:1,exp:"Jepperson Aircraft Propellers and Controls Page 3 refers"},
  {topic:"Module 17 - Propellers",q:"To fit a new front cone to a prop shaft firstly",opts:["etch the propeller serial number to the rear face", "cut in half with a hacksaw and etch a unique serial number to both halves", "coat in Engineers blue to ensure seating in the propeller front boss"],ans:1,exp:"Jepperson Aircraft Propellers and Controls Page 30 refers"},

/* ====================== DO NOT EDIT BELOW ============================
   Everything from here down is the quiz engine. It auto-adapts to
   whatever is in `questions` above — any number of questions, any
   number of topics, any topic names. No manual changes needed here
   when you swap in a new PDF's worth of questions.
====================================================================== */

// Auto-detect topics from the questions array (in first-seen order),
// unless TOPIC_COLOR_ORDER above specifies an explicit order.
const TOPICS = TOPIC_COLOR_ORDER.length
  ? TOPIC_COLOR_ORDER
  : [...new Set(questions.map(q => q.topic))];

// 7 distinct badge colors defined in CSS (t0-t6). Cycles automatically
// if there are more than 7 topics, so it never breaks on more topics.
const TCLASS = TOPICS.map((_, i) => 't' + (i % 7));

// ===================== AUTOSAVE =====================
// Unique-ish storage key per quiz, so different CBT files saved/opened
// from the same browser don't overwrite each other's saved progress.
const QUIZ_ID = (CONFIG.pageTitle + '_' + questions.length)
  .toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,80);
const STORAGE_KEY = 'cbt_progress_' + QUIZ_ID;

function saveProgress(){
  try{
    const payload = {answers, statuses, correctCount, wrongCount, skipCount, current, total:questions.length};
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }catch(e){ /* storage unavailable (private mode etc.) — fail silently */ }
  reportProgressToOpener();
}

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const d = JSON.parse(raw);
    if(!d || d.total !== questions.length || !Array.isArray(d.answers) || d.answers.length !== questions.length) return false;
    answers = d.answers; statuses = d.statuses;
    correctCount = d.correctCount||0; wrongCount = d.wrongCount||0; skipCount = d.skipCount||0;
    current = d.current||0;
    return true;
  }catch(e){ return false; }
}

function clearProgress(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
}

// If this quiz was opened from a CBT Library Dashboard tab (via window.open),
// report live score back to it so the dashboard can show progress on its card.
// Uses postMessage, which works across origins/local-file contexts alike —
// unlike localStorage, it doesn't require the two pages to share storage.
function reportProgressToOpener(){
  try{
    if(!window.opener || window.opener.closed) return;
    const done = statuses.filter(s=>s!=='unattempted').length;
    const pct = questions.length ? Math.round((done/questions.length)*100) : 0;
    window.opener.postMessage({
      type:'cbt-progress-update',
      correct:correctCount, wrong:wrongCount, skip:skipCount,
      total:questions.length, pct
    }, '*');
  }catch(e){ /* no opener, or cross-origin restriction — fail silently */ }
}
// =====================================================

// ===================== STATE =====================
// `answers`/`statuses`/`correctCount`/`wrongCount`/`skipCount` always track the
// FULL, sequential practice run (Full Quiz mode) — this is what drives the
// overall progress bar and what gets reported to the dashboard. Wrong-Answers
// and Timed modes use their own separate, non-persistent answer tracking so
// practicing there never distorts your overall progress stats.
let current=0,answers=new Array(questions.length).fill(null),statuses=new Array(questions.length).fill('unattempted');
let correctCount=0,wrongCount=0,skipCount=0;

let mode='full'; // 'full' | 'wrong' | 'timed'
let activeIndices=[];
let activePos=0;

// Randomized question order for Full Quiz mode — generated fresh each time you
// start a brand-new attempt (or hit Restart), but kept STABLE while resuming
// an in-progress attempt (so reloading mid-quiz doesn't reshuffle underneath
// you and break "resume where you left off").
const ORDER_KEY='cbt_order_'+QUIZ_ID;
let questionOrder=[];
function loadOrCreateOrder(){
  try{
    const raw=localStorage.getItem(ORDER_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(Array.isArray(d)&&d.length===questions.length){ questionOrder=d; return; }
    }
  }catch(e){}
  regenerateOrder();
}
function regenerateOrder(){
  questionOrder=shuffleArray(questions.map((_,i)=>i));
  try{ localStorage.setItem(ORDER_KEY, JSON.stringify(questionOrder)); }catch(e){}
}

// ----- Mistake tracking (requires 3 CONSECUTIVE correct answers to clear) -----
// wrongFlag[i]  = currently flagged as "needs review" (shows up in Wrong-Only mode)
// streak[i]     = consecutive correct answers in a row since the last time you
//                 got it wrong. Reaching 3 clears wrongFlag. Any wrong answer
//                 resets streak back to 0 — you have to build 3-in-a-row again.
// mistakes[i]   = total historical times ever gotten wrong (never decreases,
//                 only cleared by "Clear Mistake History") — used to sort/weight.
const MISTAKES_KEY='cbt_mistakes_'+QUIZ_ID;
const WRONGFLAG_KEY='cbt_wrongflag_'+QUIZ_ID;
const STREAK_KEY='cbt_streak_'+QUIZ_ID;
const LASTSEEN_KEY='cbt_lastseen_'+QUIZ_ID;
let mistakes=new Array(questions.length).fill(0);
let wrongFlag=new Array(questions.length).fill(false);
let streak=new Array(questions.length).fill(0);
let lastSeen=new Array(questions.length).fill(null); // ms timestamp or null (never seen)
const CLEAR_STREAK_TARGET=3;

function loadLastSeen(){
  try{
    const raw=localStorage.getItem(LASTSEEN_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(Array.isArray(d)&&d.length===questions.length) lastSeen=d;
  }catch(e){}
}
function saveLastSeen(){
  try{ localStorage.setItem(LASTSEEN_KEY, JSON.stringify(lastSeen)); }catch(e){}
}

// Wrong-mode / timed-mode transient answer tracking (not persisted, resets each session)
let modeAnswers={}; // idx -> selected option index, for wrong/timed modes

// Timed exam state
let sessionShuffle={}; // idx -> {opts:[...], ans:N} shuffled per exam session
let timedSecondsLeft=0, timedTimerHandle=null, examRevealed=true;

function loadMistakes(){
  try{
    const raw=localStorage.getItem(MISTAKES_KEY);
    if(raw){ const d=JSON.parse(raw); if(Array.isArray(d)&&d.length===questions.length) mistakes=d; }
    const rawF=localStorage.getItem(WRONGFLAG_KEY);
    if(rawF){ const d=JSON.parse(rawF); if(Array.isArray(d)&&d.length===questions.length) wrongFlag=d; }
    const rawS=localStorage.getItem(STREAK_KEY);
    if(rawS){ const d=JSON.parse(rawS); if(Array.isArray(d)&&d.length===questions.length) streak=d; }
  }catch(e){}
}
function saveMistakes(){
  try{
    localStorage.setItem(MISTAKES_KEY, JSON.stringify(mistakes));
    localStorage.setItem(WRONGFLAG_KEY, JSON.stringify(wrongFlag));
    localStorage.setItem(STREAK_KEY, JSON.stringify(streak));
  }catch(e){}
}
// Call this whenever a question is answered, in ANY mode, to keep mistake
// tracking consistent everywhere (Full Quiz, Wrong-Only, Smart Review, Timed).
function recordAnswerForMistakeTracking(i, isCorrect){
  if(isCorrect){
    if(wrongFlag[i]){
      streak[i]++;
      if(streak[i]>=CLEAR_STREAK_TARGET){ wrongFlag[i]=false; streak[i]=0; }
    }
  }else{
    mistakes[i]=(mistakes[i]||0)+1;
    wrongFlag[i]=true;
    streak[i]=0;
  }
  saveMistakes();
  updateWrongCountBadge();
}
function clearMistakeHistory(){
  if(!confirm('Clear your mistake history? This resets what "Wrong Answers Only" mode shows you, and any in-progress 3-correct streaks.'))return;
  mistakes=new Array(questions.length).fill(0);
  wrongFlag=new Array(questions.length).fill(false);
  streak=new Array(questions.length).fill(0);
  saveMistakes();
  updateWrongCountBadge();
  if(mode==='wrong') setMode('full');
}
function updateWrongCountBadge(){
  const n=wrongFlag.filter(Boolean).length;
  document.getElementById('wrong-count-badge').textContent=n;
}
function shuffleArray(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ===================== SMART REVIEW (continuous spaced repetition) =====================
// Unlike Wrong-Only (fixed snapshot) or Timed (fixed sample), Smart Review has
// no pre-built list — every time you move on, it re-evaluates ALL questions
// and picks the single best one to show next, based on live mistake count AND
// how long it's been since you last saw it. That's what makes it "automatic":
// it keeps adapting as you go, not just once when you start it.
let smartHistory=[]; // [{idx, answered:null|optionIdx}] — one entry per VIEW, so the
                      // same question can reappear later as an independent attempt
let smartPos=-1;
let smartSessionCorrect=0, smartSessionWrong=0;

function smartWeight(i){
  // Cap the "staleness" bonus so a question you've simply never seen yet
  // doesn't outweigh one you're currently struggling with — urgency (are you
  // still mid-streak toward clearing it?) dominates the ranking, staleness is
  // a secondary nudge, not the main driver.
  const daysSince = lastSeen[i] ? Math.min((Date.now()-lastSeen[i])/86400000, 14) : 3;
  const urgency = wrongFlag[i] ? (1 + (CLEAR_STREAK_TARGET-streak[i])*8) : 1;
  return urgency * (1 + daysSince);
}
function pickNextSmartIndex(excludeIdx){
  const all=questions.map((_,i)=>i);
  const candidates = all.length>1 ? all.filter(i=>i!==excludeIdx) : all;
  const weights = candidates.map(smartWeight);
  const totalW = weights.reduce((s,w)=>s+w,0);
  let r=Math.random()*totalW;
  for(let k=0;k<candidates.length;k++){
    r-=weights[k];
    if(r<=0) return candidates[k];
  }
  return candidates[candidates.length-1];
}
function smartAdvance(){
  const prevIdx = smartHistory.length ? smartHistory[smartHistory.length-1].idx : null;
  const nextIdx = pickNextSmartIndex(prevIdx);
  smartHistory.push({idx:nextIdx, answered:null});
  smartPos=smartHistory.length-1;
  lastSeen[nextIdx]=Date.now();
  saveLastSeen();
  renderQ(nextIdx);
}
function smartPrev(){
  if(smartPos<=0)return;
  smartPos--;
  renderQ(smartHistory[smartPos].idx);
}
function endSmartSession(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='block';
  window.scrollTo(0,0);
  const answeredVisits = smartHistory.filter(v=>v.answered!==null);
  const total = answeredVisits.length;
  const ec = smartSessionCorrect, ew = smartSessionWrong;
  const pct = total ? Math.round(ec/total*100) : 0;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('sum-total').textContent=total;
  document.getElementById('sum-correct').textContent=ec;
  document.getElementById('sum-wrong').textContent=ew;
  document.getElementById('sum-skip').textContent=0;
  document.getElementById('res-grade').textContent='SMART REVIEW SESSION COMPLETE';
  document.getElementById('res-grade').style.color='var(--accent)';
  document.getElementById('res-bar').style.width=pct+'%';
  document.getElementById('res-bar').style.background='var(--accent)';
  const list=document.getElementById('review-list');list.innerHTML='';
  const L=['A','B','C','D'];
  answeredVisits.forEach(v=>{
    const q=questions[v.idx];
    const st = v.answered===q.ans ? 'correct' : 'wrong';
    const bc=st==='correct'?'badge-correct':'badge-wrong';
    const bt=st==='correct'?'✔ Correct':'✘ Wrong';
    const div=document.createElement('div');div.className='review-item';
    div.innerHTML=`<div class="review-q">
      <span class="topic-badge ${topicClass(q.topic)}" style="font-size:0.65rem;padding:1px 7px;margin-right:6px;">${q.topic}</span>
      <strong>Q${v.idx+1}.</strong> ${q.q} <span class="badge ${bc}">${bt}</span></div>
      <div class="review-row"><span class="review-label">Your Answer:</span>
      <span class="review-val" style="color:${st==='correct'?'var(--correct)':'var(--wrong)'}">${L[v.answered]}. ${q.opts[v.answered]}</span></div>
      <div class="review-row"><span class="review-label">Correct:</span>
      <span class="review-val" style="color:var(--correct)">${L[q.ans]}. ${q.opts[q.ans]}</span></div>
      ${q.exp?`<div class="review-exp">💡 ${q.exp}</div>`:''}`;
    list.appendChild(div);
  });
}

// ===================== MODE SWITCHING =====================
function setMode(m){
  stopTimer();
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));

  if(m==='wrong'){
    const wrongIdxs=questions.map((_,i)=>i).filter(i=>wrongFlag[i]);
    if(wrongIdxs.length===0){
      alert('No mistake history yet. Answer some questions wrong first (in any mode) and they\'ll show up here for focused review — each one needs '+CLEAR_STREAK_TARGET+' correct answers in a row to clear.');
      return;
    }
    // Least progress toward clearing shown first (0/3 streak = most urgent),
    // tie-broken by total historical mistakes (worst first).
    wrongIdxs.sort((a,b)=>(streak[a]-streak[b]) || (mistakes[b]-mistakes[a]));
    activeIndices=wrongIdxs;
    modeAnswers={};
    mode='wrong';
    examRevealed=true;
    document.getElementById('mode-btn-wrong').classList.add('active');
    document.getElementById('exam-banner').style.display='none';
    document.getElementById('timer-chip').style.display='none';
    document.getElementById('nav-section').style.display='';
    activePos=0;
    buildNav();
    renderQ(activeIndices[0]);

  }else if(m==='timed'){
    const countStr=prompt('How many questions in this timed exam?','20');
    if(countStr===null)return;
    const count=Math.max(1,Math.min(questions.length,parseInt(countStr,10)||20));
    const minStr=prompt('Time limit in minutes?','30');
    if(minStr===null)return;
    const minutes=Math.max(1,parseInt(minStr,10)||30);

    // Weighted sample: questions you're currently struggling with (still mid-
    // streak toward clearing) are more likely to be included — a lightweight
    // spaced-repetition effect — but it's still a realistic simulated mix,
    // not ONLY your weak spots.
    const weighted=[];
    questions.forEach((_,i)=>{ const w=Math.max(1,Math.round(smartWeight(i))); for(let k=0;k<w;k++) weighted.push(i); });
    const chosen=new Set();
    let guard=0;
    while(chosen.size<count && chosen.size<questions.length && guard<count*50){
      chosen.add(weighted[Math.floor(Math.random()*weighted.length)]);
      guard++;
    }
    activeIndices=shuffleArray([...chosen]);
    sessionShuffle={};
    activeIndices.forEach(i=>{
      const q=questions[i];
      const order=shuffleArray(q.opts.map((_,k)=>k));
      sessionShuffle[i]={opts:order.map(k=>q.opts[k]), ans:order.indexOf(q.ans)};
    });
    modeAnswers={};
    mode='timed';
    examRevealed=false;
    document.getElementById('mode-btn-timed').classList.add('active');
    document.getElementById('exam-banner').style.display='block';
    document.getElementById('timer-chip').style.display='';
    document.getElementById('nav-section').style.display='';
    startTimer(minutes*60);
    activePos=0;
    buildNav();
    renderQ(activeIndices[0]);

  }else if(m==='smart'){
    smartHistory=[];
    smartPos=-1;
    smartSessionCorrect=0;smartSessionWrong=0;
    modeAnswers={};
    mode='smart';
    examRevealed=true;
    document.getElementById('mode-btn-smart').classList.add('active');
    document.getElementById('exam-banner').style.display='none';
    document.getElementById('timer-chip').style.display='none';
    document.getElementById('nav-section').style.display='none';
    smartAdvance();

  }else{ // full
    activeIndices=questionOrder;
    mode='full';
    examRevealed=true;
    document.getElementById('mode-btn-full').classList.add('active');
    document.getElementById('exam-banner').style.display='none';
    document.getElementById('timer-chip').style.display='none';
    document.getElementById('nav-section').style.display='';
    buildNav();
    const firstUnattemptedPos=questionOrder.findIndex(idx=>statuses[idx]==='unattempted');
    renderQ(firstUnattemptedPos===-1?questionOrder[0]:questionOrder[firstUnattemptedPos]);
  }
}

function startTimer(seconds){
  timedSecondsLeft=seconds;
  updateTimerDisplay();
  timedTimerHandle=setInterval(()=>{
    timedSecondsLeft--;
    updateTimerDisplay();
    if(timedSecondsLeft<=0){ stopTimer(); submitExam(true); }
  },1000);
}
function stopTimer(){
  if(timedTimerHandle){ clearInterval(timedTimerHandle); timedTimerHandle=null; }
}
function updateTimerDisplay(){
  const m=Math.floor(timedSecondsLeft/60), s=timedSecondsLeft%60;
  document.getElementById('hdr-timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

// ===================== CORE ENGINE =====================
function topicClass(t){const i=TOPICS.indexOf(t);return i>=0?TCLASS[i]:'t0';}

function applyConfig(){
  document.getElementById('page-title').textContent=CONFIG.pageTitle+' ('+questions.length+'Q)';
  document.getElementById('header-title-text').innerHTML=
    CONFIG.headerLeft+' &nbsp;|&nbsp; <span>'+CONFIG.headerRight+'</span>';
  document.querySelector('.results-title').textContent=CONFIG.resultsTitle;
  document.getElementById('res-subtitle').textContent=
    CONFIG.resultsSubtitle+' · '+questions.length+' Questions';
}

function init(){
  applyConfig();
  loadProgress();
  loadMistakes();
  loadLastSeen();
  loadOrCreateOrder();
  activeIndices=questionOrder;
  updateWrongCountBadge();
  buildNav();
  updateScoreHeader();
  reportProgressToOpener();
  try{
    if(window.opener && !window.opener.closed){
      document.getElementById('btn-back-dashboard').style.display='';
    }
  }catch(e){}
  const firstUnattemptedPos=questionOrder.findIndex(idx=>statuses[idx]==='unattempted');
  const resumeIdx=firstUnattemptedPos===-1?questionOrder[0]:questionOrder[firstUnattemptedPos];
  renderQ(resumeIdx);
}

function remainingToClear(i){
  return wrongFlag[i] ? (CLEAR_STREAK_TARGET-streak[i]) : 0;
}

function buildNav(){
  const g=document.getElementById('nav-grid');g.innerHTML='';
  activeIndices.forEach((i,pos)=>{
    const b=document.createElement('button');
    b.className='nav-dot unattempted';b.textContent=pos+1;b.id='nav-'+i;
    b.setAttribute('data-mistakes', remainingToClear(i));
    if(wrongFlag[i]) b.title='Needs '+remainingToClear(i)+' more correct in a row to clear from Wrong Answers Only';
    b.onclick=()=>renderQ(i);g.appendChild(b);
  });
}

function updateNav(){
  if(mode==='smart')return; // smart mode has no fixed nav grid (see nav-section hidden)
  activeIndices.forEach(i=>{
    const el=document.getElementById('nav-'+i);
    if(!el)return;
    el.setAttribute('data-mistakes', remainingToClear(i));
    if(mode==='full'){
      el.className='nav-dot '+(i===current?'current':statuses[i]);
    }else{
      const st = modeAnswers[i]===undefined ? 'unattempted' :
        (!examRevealed ? 'answered' : (modeAnswers[i]===effectiveAns(i) ? 'correct':'wrong'));
      el.className='nav-dot '+(i===current?'current':st);
    }
  });
}

// returns the correct-answer index for question i, accounting for timed-mode shuffling
function effectiveOpts(i){ return mode==='timed'&&sessionShuffle[i] ? sessionShuffle[i].opts : questions[i].opts; }
function effectiveAns(i){ return mode==='timed'&&sessionShuffle[i] ? sessionShuffle[i].ans : questions[i].ans; }

function renderQ(idx){
  current=idx;
  activePos=activeIndices.indexOf(idx);
  const q=questions[idx];
  const opts=effectiveOpts(idx);
  const ansIdx=effectiveAns(idx);

  document.getElementById('q-num-label').textContent = mode==='smart' ? 'Review #'+(smartPos+1) : 'Q '+(activePos+1);
  document.getElementById('q-of-total').textContent =
    mode==='full' ? 'of '+questions.length+' Questions' :
    mode==='smart' ? 'Smart Review session · '+(smartPos+1)+' viewed so far (original Q'+(idx+1)+')' :
    'of '+activeIndices.length+' in this session (original Q'+(idx+1)+')';
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('topic-badge-wrap').innerHTML=
    `<div class="topic-badge ${topicClass(q.topic)}">${q.topic}</div>`;

  const answeredVal = mode==='full' ? answers[idx] :
    mode==='smart' ? (smartHistory[smartPos] ? smartHistory[smartPos].answered : null) :
    (modeAnswers[idx]!==undefined?modeAnswers[idx]:null);
  const showFeedbackNow = mode!=='timed' || examRevealed;

  const ow=document.getElementById('options-wrap');ow.innerHTML='';
  const L=['A','B','C','D'];
  opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-label">${L[i]}.</span><span>${opt}</span>`;
    btn.onclick=()=>selectAnswer(i);
    if(answeredVal!==null){
      btn.disabled=true;
      if(showFeedbackNow){
        if(i===ansIdx)btn.classList.add('correct');
        else if(i===answeredVal)btn.classList.add('wrong');
      }else if(i===answeredVal){
        btn.classList.add('selected-pending');
        btn.style.borderColor='var(--accent)';
      }
    }
    ow.appendChild(btn);
  });

  const fb=document.getElementById('feedback');
  if(answeredVal!==null && showFeedbackNow){
    const isC=answeredVal===ansIdx;
    fb.className='feedback show '+(isC?'correct':'wrong');
    fb.innerHTML=isC
      ?`✔ Correct!${q.exp?'<br><small style="opacity:.8">'+q.exp+'</small>':''}`
      :`✘ Incorrect. Correct: <strong>${L[ansIdx]}. ${opts[ansIdx]}</strong>${q.exp?'<br><small style="opacity:.8">'+q.exp+'</small>':''}`;
  }else if(answeredVal!==null && !showFeedbackNow){
    fb.className='feedback show';
    fb.style.background='rgba(30,143,255,0.1)';fb.style.borderColor='rgba(30,143,255,0.3)';fb.style.color='var(--accent)';
    fb.innerHTML='Answer recorded — feedback shown after you submit the exam.';
  }else{fb.className='feedback';fb.textContent='';}

  if(mode==='smart'){
    document.getElementById('btn-prev').style.display=smartPos<=0?'none':'';
    document.getElementById('btn-skip').style.display='none';
    document.getElementById('btn-next').style.display='';
    document.getElementById('btn-next').textContent='Next (Smart Pick) ▶';
    document.getElementById('btn-finish').style.display='none';
    document.getElementById('btn-submit-exam').style.display='none';
    document.getElementById('btn-end-smart').style.display='';
  }else{
    document.getElementById('btn-next').textContent='Next ▶';
    document.getElementById('btn-end-smart').style.display='none';
    const isFirst=activePos===0, isLast=activePos===activeIndices.length-1;
    document.getElementById('btn-prev').style.display=isFirst?'none':'';
    document.getElementById('btn-skip').style.display=mode==='full'?'':'none';
    document.getElementById('btn-skip').disabled=answeredVal!==null;
    document.getElementById('btn-next').style.display=isLast?'none':'';
    document.getElementById('btn-finish').style.display=(isLast&&mode!=='timed')?'':'none';
    document.getElementById('btn-submit-exam').style.display=(mode==='timed')?'':'none';
  }

  if(mode==='full'){
    const done=statuses.filter(s=>s!=='unattempted').length;
    document.getElementById('prog-bar').style.width=(done/questions.length*100)+'%';
  }else if(mode==='smart'){
    const seen=smartHistory.filter(v=>v.answered!==null).length;
    const pct = seen ? Math.round(smartSessionCorrect/seen*100) : 0;
    document.getElementById('prog-bar').style.width=pct+'%';
  }else{
    const done=Object.keys(modeAnswers).length;
    document.getElementById('prog-bar').style.width=(done/activeIndices.length*100)+'%';
  }
  updateNav();
}

function selectAnswer(optIdx){
  if(mode==='full'){
    if(answers[current]!==null)return;
    answers[current]=optIdx;
    const isCorrect=(optIdx===questions[current].ans);
    if(isCorrect){statuses[current]='correct';correctCount++;}
    else{statuses[current]='wrong';wrongCount++;}
    lastSeen[current]=Date.now();
    recordAnswerForMistakeTracking(current,isCorrect);
    saveLastSeen();
    updateScoreHeader();
    renderQ(current);
    saveProgress();
    if(isCorrect&&activePos<activeIndices.length-1){setTimeout(()=>navigate(1),1200);}
  }else if(mode==='smart'){
    const visit=smartHistory[smartPos];
    if(!visit||visit.answered!==null)return;
    visit.answered=optIdx;
    const isCorrect=(optIdx===questions[current].ans);
    if(isCorrect){ smartSessionCorrect++; } else { smartSessionWrong++; }
    recordAnswerForMistakeTracking(current,isCorrect);
    renderQ(current);
    if(isCorrect){ setTimeout(()=>smartAdvance(),1200); }
  }else{
    if(modeAnswers[current]!==undefined)return;
    modeAnswers[current]=optIdx;
    const isCorrect=(optIdx===effectiveAns(current));
    recordAnswerForMistakeTracking(current,isCorrect);
    renderQ(current);
    if(mode==='wrong'&&isCorrect&&activePos<activeIndices.length-1){setTimeout(()=>navigate(1),1200);}
    else if(mode==='timed'&&activePos<activeIndices.length-1){setTimeout(()=>navigate(1),400);}
  }
}

function skipQuestion(){
  if(mode!=='full')return; // no skipping mid-exam; not applicable in wrong/smart modes
  if(answers[current]!==null)return;
  statuses[current]='skipped';skipCount++;
  updateScoreHeader();saveProgress();navigate(1);
}

function navigate(dir){
  if(mode==='smart'){
    if(dir<0) smartPrev(); else smartAdvance();
    return;
  }
  const nextPos=activePos+dir;
  if(nextPos<0||nextPos>=activeIndices.length)return;
  renderQ(activeIndices[nextPos]);
  if(mode==='full') saveProgress();
}

function updateScoreHeader(){
  document.getElementById('hdr-c').textContent=correctCount;
  document.getElementById('hdr-w').textContent=wrongCount;
  document.getElementById('hdr-s').textContent=skipCount;
}

// ===================== EXAM SUBMIT =====================
function submitExam(auto){
  stopTimer();
  examRevealed=true;
  let ec=0,ew=0;
  activeIndices.forEach(i=>{
    if(modeAnswers[i]===undefined)return;
    if(modeAnswers[i]===effectiveAns(i)) ec++; else ew++;
  });
  const unanswered=activeIndices.length-(ec+ew);
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='block';
  window.scrollTo(0,0);
  // Timed Exam counts unanswered questions against you (realistic exam scoring).
  // Wrong-Answers-Only only scores what you actually attempted.
  const total = mode==='timed' ? activeIndices.length : (ec+ew);
  const pct=total?Math.round(ec/total*100):0;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('sum-total').textContent=activeIndices.length;
  document.getElementById('sum-correct').textContent=ec;
  document.getElementById('sum-wrong').textContent=ew;
  document.getElementById('sum-skip').textContent=unanswered;
  let grade,gc;
  if(auto){grade='TIME UP — '+(pct>=75?'PASS':'REVIEW REQUIRED');gc=pct>=75?'#22c55e':'#ef4444';}
  else if(pct>=90){grade='EXCELLENT — PASS';gc='#22c55e';}
  else if(pct>=75){grade='GOOD — PASS';gc='#22c55e';}
  else if(pct>=60){grade='AVERAGE — MARGINAL';gc='#f59e0b';}
  else{grade='BELOW STANDARD — REVIEW REQUIRED';gc='#ef4444';}
  document.getElementById('res-grade').textContent=grade;
  document.getElementById('res-grade').style.color=gc;
  document.getElementById('res-bar').style.width=pct+'%';
  document.getElementById('res-bar').style.background=gc;
  buildExamReview();
}

function buildExamReview(){
  const list=document.getElementById('review-list');list.innerHTML='';
  const L=['A','B','C','D'];
  activeIndices.forEach(i=>{
    const q=questions[i];
    const opts=effectiveOpts(i), ansIdx=effectiveAns(i);
    const given=modeAnswers[i];
    const st = given===undefined ? 'skipped' : (given===ansIdx?'correct':'wrong');
    const bc=st==='correct'?'badge-correct':st==='wrong'?'badge-wrong':'badge-skipped';
    const bt=st==='correct'?'✔ Correct':st==='wrong'?'✘ Wrong':'– Not answered';
    const ya=given!==undefined?L[given]+'. '+opts[given]:'Not answered';
    const div=document.createElement('div');div.className='review-item';
    div.innerHTML=`<div class="review-q">
      <span class="topic-badge ${topicClass(q.topic)}" style="font-size:0.65rem;padding:1px 7px;margin-right:6px;">${q.topic}</span>
      <strong>Q${i+1}.</strong> ${q.q} <span class="badge ${bc}">${bt}</span></div>
      <div class="review-row"><span class="review-label">Your Answer:</span>
      <span class="review-val" style="color:${st==='correct'?'var(--correct)':st==='wrong'?'var(--wrong)':'var(--skip)'}">${ya}</span></div>
      <div class="review-row"><span class="review-label">Correct:</span>
      <span class="review-val" style="color:var(--correct)">${L[ansIdx]}. ${opts[ansIdx]}</span></div>
      ${q.exp?`<div class="review-exp">💡 ${q.exp}</div>`:''}`;
    list.appendChild(div);
  });
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');
}

function showResults(){
  if(mode!=='full'){ submitExam(false); return; }
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='block';
  window.scrollTo(0,0);
  const total=questions.length;

  const pct=attempted?Math.round(correctCount/attempted*100):0;
  document.getElementById('res-pct').textContent=pct+'%';

  document.getElementById('sum-correct').textContent=correctCount;

  document.getElementById('sum-skip').textContent=skipCount;

  if(pct>=90){grade='EXCELLENT — PASS';gc='#22c55e';}
  else if(pct>=75){grade='GOOD — PASS';gc='#22c55e';}
  else if(pct>=60){grade='AVERAGE — MARGINAL';gc='#f59e0b';}
  else{grade='BELOW STANDARD — REVIEW REQUIRED';gc='#ef4444';}
  document.getElementById('res-grade').textContent=grade;
  document.getElementById('res-grade').style.color=gc;
  document.getElementById('res-bar').style.width=pct+'%';

function filterReview(type,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const list=document.getElementById('review-list');list.innerHTML='';
  const L=['A','B','C','D'];
  questions.forEach((q,i)=>{
    const st=statuses[i];
    if(type!=='all'&&st!==type)return;
    const div=document.createElement('div');div.className='review-item';
    const bc=st==='correct'?'badge-correct':st==='wrong'?'badge-wrong':'badge-skipped';
    const bt=st==='correct'?'✔ Correct':st==='wrong'?'✘ Wrong':'– Skipped';
    const ya=answers[i]!==null?L[answers[i]]+'. '+q.opts[answers[i]]:'Not answered';
    const tc=topicClass(q.topic);
    div.innerHTML=`<div class="review-q">
      <span class="topic-badge ${tc}" style="font-size:0.65rem;padding:1px 7px;margin-right:6px;">${q.topic}</span>
      <strong>Q${i+1}.</strong> ${q.q} <span class="badge ${bc}">${bt}</span></div>
      <div class="review-row"><span class="review-label">Your Answer:</span>
      <span class="review-val" style="color:${st==='correct'?'var(--correct)':st==='wrong'?'var(--wrong)':'var(--skip)'}">${ya}</span></div>
      <div class="review-row"><span class="review-label">Correct:</span>
      <span class="review-val" style="color:var(--correct)">${L[q.ans]}. ${q.opts[q.ans]}</span></div>
      ${q.exp?`<div class="review-exp">💡 ${q.exp}</div>`:''}`;
    list.appendChild(div);
  });
}

function restartQuiz(){
  // Restart resets Full Quiz progress AND gives you a freshly randomized
  // question order. Mistake history is intentionally NOT cleared here, since
  // it's meant to persist across attempts — use "Clear Mistake History" in
  // the mode bar if you want that reset too.
  answers=new Array(questions.length).fill(null);
  statuses=new Array(questions.length).fill('unattempted');
  correctCount=0;wrongCount=0;skipCount=0;
  clearProgress();
  regenerateOrder();
  updateScoreHeader();
  reportProgressToOpener();
  document.getElementById('results-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('prog-bar').style.width='0%';
  window.scrollTo(0,0);
  setMode('full');
}

init();
</script>
</body>
</html>

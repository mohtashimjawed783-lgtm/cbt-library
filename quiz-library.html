<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CBT Quiz Library</title><style>body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,#12334a,transparent 42%),#03050a;color:#eef2f9;font:16px Arial,sans-serif;padding:36px}main{max-width:1100px;margin:auto}h1{color:#67e8f9}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}.card{padding:18px;border:1px solid #334155;border-radius:14px;background:rgba(255,255,255,.07)}a{display:inline-block;margin-top:14px;padding:9px 14px;border-radius:8px;background:#0891b2;color:white;text-decoration:none}.meta{color:#aab4c8;font-size:.85rem}</style></head><body><main><h1>CBT Quiz Library</h1><p id="status">Loading quizzes…</p><div class="grid" id="grid"></div></main><script>fetch('quiz-index.json').then(r=>r.json()).then(items=>{document.getElementById('status').textContent=items.length?items.length+' quiz(es) available.':'No quizzes yet.';document.getElementById('grid').innerHTML=items.map(q=>`<article class="card"><h2>${q.title}</h2><div class="meta">${q.module} · ${q.category} · ${q.session}</div><div class="meta">${q.count} questions</div><a href="CBT_Player.html?quiz=${encodeURIComponent(q.file)}">Start quiz</a></article>`).join('')}).catch(()=>document.getElementById('status').textContent='Quiz index is not available yet.');</script></body></html>
